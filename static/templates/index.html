<!-- This is GUI for Breast Cancer Detection Application Using Machine Learning Classifier -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ML API - Cancer Detection</title>

    <style>
        /* CSS code for button */
        body {
            background-image: url('static/images/world.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .button_css {
            color: #494949 !important;
            text-transform: uppercase;
            text-decoration: none;
            background: #ffffff;
            padding: 15px;
            border: 4px solid #494949 !important;
            display: inline-block;
            transition: all 0.4s ease 0s;
            cursor: pointer;
        }

        .button_css:hover {
            color: #ffffff !important;
            background: #f6b93b;
            border-color: #f6b93b !important;
        }

        .upload-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            display: inline-block;
        }

        #imagePreview {
            margin-top: 15px;
            max-width: 300px;
            display: none;
            border: 2px solid #494949;
        }
    </style>
</head>

<body>

    <!-- Banner -->
    <div>
        <img src="static/images/Indian AI Hospital.png" class="w3-border w3-padding" alt="Indian AI Hospital" style="width:100%">
    </div>

    <div class="login">
        <center>
            <!-- CRITICAL: Added enctype for file uploads -->
            <form action="{{ url_for('predict')}}" method="post" enctype="multipart/form-data">
                
                <div class="upload-section">
                    <h2>Option 1: Upload Mammogram/Scan</h2>
                    <input type="file" name="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
                    <br>
                    <img id="imagePreview" src="#" alt="Image Preview"/>
                </div>

                <hr style="width: 50%; border: 1px solid #494949;">

                <h1>Option 2: Enter tumor features >>></h1>
                
                <!-- Your existing text inputs -->
                <input type="text" name="mean_radius" placeholder="mean radius" />
                <input type="text" name="mean_texture" placeholder="mean texture" />
                <input type="text" name="mean_perimeter" placeholder="mean perimeter" />
                <input type="text" name="mean_area" placeholder="mean area" />
                <input type="text" name="mean_smoothness" placeholder="mean smoothness" />
                <input type="text" name="mean_compactness" placeholder="mean compactness" />
                <br>
                <input type="text" name="mean_concavity" placeholder="mean concavity" />
                <input type="text" name="mean_concave_points" placeholder="mean concave points" />
                <input type="text" name="mean_symmetry" placeholder="mean symmetry" />
                <input type="text" name="mean_fractal_dimension" placeholder="mean fractal dimension" />
                <input type="text" name="radius_error" placeholder="radius error" />
                <input type="text" name="texture_error" placeholder="texture error" />
                <br>
                <input type="text" name="perimeter_error" placeholder="perimeter error" />
                <input type="text" name="area_error" placeholder="area error " />
                <input type="text" name="smoothness_error" placeholder="smoothness error" />
                <input type="text" name="compactness_error" placeholder="compactness error" />
                <input type="text" name="concavity_error" placeholder="concavity error" />
                <input type="text" name="concave_points_error" placeholder="concave points error" />
                <br>
                <input type="text" name="symmetry_error" placeholder="symmetry error" />
                <input type="text" name="fractal_dimension_error" placeholder="fractal dimension error" />
                <input type="text" name="worst_radius" placeholder="worst radius" />
                <input type="text" name="worst_texture" placeholder="worst texture" />
                <input type="text" name="worst_perimeter" placeholder="worst perimeter" />
                <input type="text" name="worst_area" placeholder="worst area" />
                <br>
                <input type="text" name="worst_smoothness" placeholder="worst smoothness" />
                <input type="text" name="worst_compactness" placeholder="worst compactness" />
                <input type="text" name="worst_concavity" placeholder="worst concavity" />
                <input type="text" name="worst_concave_points" placeholder="worst concave points" />
                <input type="text" name="worst_symmetry" placeholder="'worst symmetry" />
                <input type="text" name="worst_fractal_dimension" placeholder="worst fractal dimension" />
                <br><br>

                <!-- Action Button -->
                <div class="button_cont">
                    <button type="submit" class="button_css"><strong>Predict Cancer</strong></button>
                </div>
            </form>
        </center>

        <!-- Output section -->
        <div>
            <center>
                <h1 style="background: white; display: inline-block; padding: 10px;">{{ prediction_text }}</h1>
            </center>
        </div>
    </div>

    <!-- Script to handle image preview -->
    <script>
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function(){
                var output = document.getElementById('imagePreview');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>

</body>
</html>
